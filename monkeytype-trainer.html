<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Системное программирование — тренажёр печати</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Courier New', 'Fira Code', monospace;
        }

        body {
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: #161b22;
            border-radius: 20px;
            padding: 20px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            color: #e6edf3;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .progress-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .progress {
            font-size: 16px;
            background: #21262d;
            padding: 6px 14px;
            border-radius: 30px;
            color: #8b949e;
        }

        .mode-switch {
            display: flex;
            gap: 5px;
            background: #21262d;
            padding: 4px;
            border-radius: 30px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .mode-btn.active {
            background: #1f6feb;
            color: white;
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat {
            background: #21262d;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
        }

        .stat span {
            color: #f0f6fc;
            font-weight: bold;
            margin-left: 6px;
        }

        .question-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 500;
            color: #f0f6fc;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
            word-break: break-word;
        }

        .stage-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
            gap: 12px 16px;
        }

        .stage-badge {
            background: #1f6feb;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            display: inline-block;
        }

        .typing-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            display: grid;
        }

        .text-overlay,
        .ghost-input {
            grid-area: 1 / 1 / 2 / 2;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 0;
            margin: 0;
            border: none;
            background: transparent;
            font-family: inherit;
            tab-size: 4;
            -moz-tab-size: 4;
        }

        .text-overlay {
            color: #6e7681;
            pointer-events: none;
            z-index: 1;
        }

        .text-overlay span.correct {
            color: #ffffff;
        }

        .text-overlay span.incorrect {
            background-color: #da3633;
            color: #ffffff;
            border-radius: 4px;
        }

        .text-overlay span.typed-visible {
            color: #ffffff;
        }

        .text-overlay span.typed-visible.incorrect {
            background-color: #da3633;
            color: #ffffff;
        }

        .ghost-input {
            color: transparent;
            caret-color: #f0883e;
            resize: none;
            outline: none;
            overflow: hidden;
            z-index: 2;
        }

        .ghost-input::selection {
            background: rgba(255, 255, 255, 0.1);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .action-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #c9d1d9;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: #1f6feb;
            cursor: pointer;
        }

        .next-btn {
            background: #238636;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2ea043;
            transition: 0.2s;
            white-space: nowrap;
        }

        .next-btn:hover:not(:disabled) {
            background: #2ea043;
        }

        .next-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .hint {
            color: #8b949e;
            font-size: 13px;
        }

        .note {
            margin-top: 16px;
            color: #f0883e;
            font-size: 13px;
            border-left: 3px solid #f0883e;
            padding-left: 14px;
        }

        .hidden {
            display: none !important;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 16px 16px;
                border-radius: 16px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .progress-group {
                justify-content: space-between;
            }

            .mode-switch {
                flex: 1;
                justify-content: center;
            }

            .mode-btn {
                flex: 1;
                text-align: center;
                padding: 6px 8px;
                font-size: 13px;
            }

            .stats {
                justify-content: center;
            }

            .stat {
                padding: 6px 12px;
                font-size: 13px;
            }

            .question-box {
                font-size: 16px;
                padding: 14px 16px;
            }

            .stage-header {
                gap: 8px 12px;
            }

            .stage-badge {
                font-size: 13px;
                padding: 4px 12px;
            }

            .checkbox-label {
                font-size: 13px;
                white-space: normal;
            }

            .typing-container {
                padding: 14px 16px;
                min-height: 130px;
                max-height: 350px;
            }

            .text-overlay,
            .ghost-input {
                font-size: 14px;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .action-left {
                justify-content: center;
            }

            .next-btn {
                width: 100%;
                text-align: center;
                padding: 12px 20px;
            }

            .hint {
                text-align: center;
                width: 100%;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 400px) {
            .progress {
                font-size: 14px;
                padding: 5px 10px;
            }

            .mode-btn {
                font-size: 12px;
                padding: 5px 6px;
            }

            .stat {
                padding: 5px 10px;
                font-size: 12px;
            }

            .checkbox-label {
                font-size: 12px;
            }

            .next-btn {
                font-size: 15px;
                padding: 10px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="progress-group">
                <div class="progress" id="taskCounter">Задание 1 / 25</div>
                <div class="mode-switch" id="modeSwitch">
                    <button class="mode-btn active" data-mode="tasks">Задания</button>
                    <button class="mode-btn" data-mode="questions">Вопросы</button>
                </div>
            </div>
            <div class="stats">
                <div class="stat">✅ <span id="correctCount">0</span></div>
                <div class="stat">❌ <span id="errorCount">0</span></div>
            </div>
        </div>

        <div class="question-box" id="questionDisplay"></div>

        <!-- Этап: Код / Ответ -->
        <div class="stage-header" id="codeHeader">
            <span class="stage-badge" id="codeStageLabel">📝 КОД</span>
            <label class="checkbox-label">
                <input type="checkbox" id="explainCheckbox" checked> Добавить объяснение
            </label>
            <label class="checkbox-label">

                <input type="checkbox" id="shortAnswerCheckbox"> Короткие ответы
            </label>
        </div>
        <div class="typing-container" id="codeTypingContainer">
            <div id="codeOverlay" class="text-overlay"></div>
            <textarea id="codeGhostInput" class="ghost-input" spellcheck="false" autofocus></textarea>
        </div>

        <!-- Этап: Объяснение (только для заданий, изначально скрыт) -->
        <div class="stage-header hidden" id="explainHeader">
            <span class="stage-badge" id="explainStageLabel">📝 ОБЪЯСНЕНИЕ</span>
        </div>
        <div class="typing-container hidden" id="explainTypingContainer">
            <div id="explainOverlay" class="text-overlay"></div>

        </div>

        <div class="action-bar">
            <div class="action-left">
                <div class="hint">← Backspace · Tab → 4 пробела</div>
            </div>
            <button class="next-btn" id="nextTaskBtn" disabled>Следующее задание →</button>
        </div>
        <div class="note">
            ⚡ Переключайтесь между заданиями и вопросами. Для вопросов доступны полные и краткие ответы.
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            // ---------- МАССИВЫ ЗАДАНИЙ И ВОПРОСОВ ----------

            const tasks = [
                {
                    question: "1. Динамический массив с ручным управлением памятью",
                    code: `#include <stdio.h>
#include <stdlib.h>

typedef struct {
    int *data;
    size_t len, cap;
} DynArray;

DynArray dynarray_create(size_t cap) {
    DynArray a;
    a.data = malloc(cap * sizeof(int));
    a.len = 0;
    a.cap = a.data ? cap : 0;
    return a;
}

void dynarray_push(DynArray *a, int val) {
    if (!a || !a->data) return;
    if (a->len == a->cap) {
        size_t newcap = a->cap ? a->cap * 2 : 1;
        int *p = realloc(a->data, newcap * sizeof(int));
        if (!p) return;
        a->data = p;
        a->cap = newcap;
    }
    *(a->data + a->len++) = val;
}

void dynarray_free(DynArray *a) {
    if (a) {
        free(a->data);
        a->data = NULL;
        a->len = a->cap = 0;
    }
}

int main() {
    DynArray arr = dynarray_create(2);
    dynarray_push(&arr, 10);
    dynarray_push(&arr, 20);
    dynarray_push(&arr, 30);
    for (size_t i = 0; i < arr.len; i++)
        printf("%d ", *(arr.data + i));
    printf("\\n");
    dynarray_free(&arr);
    return 0;
}`,

                    code: `#include <stdio.h>
#include <stdlib.h>

int* merge_sorted(const int *a, size_t m, const int *b, size_t n) {
    if (!a || !b) return NULL;
    int *c = malloc((m + n) * sizeof(int));
    if (!c) return NULL;
    const int *pa = a, *pb = b, *ea = a + m, *eb = b + n;
    int *pc = c;
    while (pa < ea && pb < eb)
        *pc++ = (*pa <= *pb) ? *pa++ : *pb++;
    while (pa < ea) *pc++ = *pa++;
    while (pb < eb) *pc++ = *pb++;
    return c;
}

int main() {
    int A[] = {1, 3, 5};
    int B[] = {2, 4, 6};
    int *C = merge_sorted(A, 3, B, 3);
    if (C) {

        printf("\\n");

    }

int is_palindrome(const int *a, size_t n) {
    if (!a) return 0;
    const int *l = a, *r = a + n - 1;
    while (l < r) if (*l++ != *r--) return 0;

}

int main() {
    int arr1[] = {1, 2, 3, 2, 1};

                {

                    code: `#include <stdio.h>
#include <stdlib.h>

int get(const int *m, size_t rows, size_t cols, size_t i, size_t j) {
    return *(m + i * cols + j);
}

void set(int *m, size_t rows, size_t cols, size_t i, size_t j, int v) {

}

int main() {
    size_t r = 3, c = 4;

                {

                    code: `#include <stdio.h>

void bubbleSort(int *a, size_t n) {
    if (!a || n < 2) return;
    for (size_t i = 0; i < n - 1; i++)
        for (size_t j = 0; j < n - i - 1; j++)
            if (*(a + j) > *(a + j + 1)) {
                int t = *(a + j);
                *(a + j) = *(a + j + 1);
                *(a + j + 1) = t;
            }
}

int main() {

unsigned long long factorial(int n) {

int gcd(int a, int b) {

int lcm(int a, int b) {

int is_prime(int n) {

                    question: "13. Разложение числа на простые множители",
                    code: `#include <stdio.h>

void print_prime_factors(int n) {
    if (n <= 1) { printf("%d = %d\\n", n, n); return; }
    printf("%d = ", n);
    int first = 1, m = n;
    for (int p = 2; p * p <= m; p++) {
        int cnt = 0;
        while (m % p == 0) { m /= p; cnt++; }
        if (cnt) {
            if (!first) printf(" * ");
            printf("%d", p);
            if (cnt > 1) printf("^%d", cnt);
            first = 0;
        }
    }
    if (m > 1) {
        if (!first) printf(" * ");
        printf("%d", m);
    }
    printf("\\n");
}

int main() {

    while (e) {
        if (e & 1) r *= b;

    }

}

int main() {

    int s = 0;
    while (n) { s += n % 10; n /= 10; }
    return s;
}

int main() {
    printf("%d\\n", digit_sum(12345));

                    explanation: "Сумма цифр числа: извлекаем последнюю цифру и прибавляем к сумме."

                {

                    code: `#include <stdio.h>

void print_binary(unsigned int n) {

    char b[33] = {0};

                    shortAnswer: "Говорит компилятору не оптимизировать обращения к этой переменной потому что её значение может измениться неожиданно извне. Нужен для работы с регистрами устройств или переменными в обработчиках прерываний."

                {

            // Если tasks пуст, заполним заглушками, чтобы не сломать логику
            if (tasks.length === 0) {
                for (let i = 1; i <= 25; i++) {
                    tasks.push({
                        question: `${i}. Задание`,
                        code: `// код для задания ${i}`,
                        explanation: `Объяснение для задания ${i}`
                    });
                }
            }

            // ---------- DOM элементы ----------
            const questionDisplay = document.getElementById('questionDisplay');
            const codeOverlay = document.getElementById('codeOverlay');
            const codeGhostInput = document.getElementById('codeGhostInput');
            const explainOverlay = document.getElementById('explainOverlay');
            const explainGhostInput = document.getElementById('explainGhostInput');
            const codeTypingContainer = document.getElementById('codeTypingContainer');
            const explainTypingContainer = document.getElementById('explainTypingContainer');
            const codeHeader = document.getElementById('codeHeader');
            const explainHeader = document.getElementById('explainHeader');
            const taskCounter = document.getElementById('taskCounter');
            const correctSpan = document.getElementById('correctCount');
            const errorSpan = document.getElementById('errorCount');
            const nextBtn = document.getElementById('nextTaskBtn');
            const codeStageLabel = document.getElementById('codeStageLabel');
            const explainStageLabel = document.getElementById('explainStageLabel');
            const explainCheckbox = document.getElementById('explainCheckbox');
            const showTextCheckbox = document.getElementById('showTextCheckbox');
            const shortAnswerCheckbox = document.getElementById('shortAnswerCheckbox');
            const modeBtns = document.querySelectorAll('.mode-btn');

            // Состояние
            let currentMode = 'tasks';        // 'tasks' или 'questions'
            let currentIndex = 0;
            let stage = 'code';              // 'code' или 'explain' (только для tasks)
            let currentText = '';
            let userText = '';
            let correctChars = 0;
            let errorChars = 0;
            let isStageCompleted = false;
            let isTaskCompleted = false;

            let activeGhost = codeGhostInput;
            let activeOverlay = codeOverlay;
            let activeContainer = codeTypingContainer;

            // Получение текущего элемента (задание или вопрос)
            function getCurrentItem() {
                return currentMode === 'tasks' ? tasks[currentIndex] : questions[currentIndex];
            }

            function getTotalCount() {
                return currentMode === 'tasks' ? tasks.length : questions.length;
            }

            // Получение текста для набора в зависимости от режима и галочек
            function getCurrentTypingText() {
                const item = getCurrentItem();
                if (currentMode === 'tasks') {
                    return stage === 'code' ? item.code : item.explanation;
                } else {
                    // Режим вопросов
                    return shortAnswerCheckbox.checked ? item.shortAnswer : item.fullAnswer;
                }
            }

            // Рендеринг текста с подсветкой
            function renderOverlay(text, user, overlayEl) {
                const showText = showTextCheckbox.checked;
                let html = '';
                const len = text.length;
                const userLen = user.length;

                for (let i = 0; i < len; i++) {
                    const char = text[i];
                    let classes = [];
                    const isTyped = i < userLen;
                    const isCorrect = isTyped && user[i] === char;

                    if (showText) {
                        if (isTyped) {
                            classes.push(isCorrect ? 'correct' : 'incorrect');
                        }
                    } else {
                        if (isTyped) {
                            classes.push('typed-visible');
                            if (!isCorrect) classes.push('incorrect');
                        } else {
                            continue;
                        }
                    }

                    const displayChar = showText ? char : (isTyped ? user[i] : '');
                    html += `<span class="${classes.join(' ')}">${escapeHtml(displayChar)}</span>`;
                }

                if (!showText && userLen > len) {
                    for (let i = len; i < userLen; i++) {
                        html += `<span class="typed-visible incorrect">${escapeHtml(user[i])}</span>`;
                    }
                }

                overlayEl.innerHTML = html;
                activeGhost.style.height = 'auto';
                activeGhost.style.height = activeGhost.scrollHeight + 'px';
            }

            function escapeHtml(str) {
                return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
            }

            function updateStats() {
                let correct = 0, errors = 0;
                const len = Math.min(userText.length, currentText.length);
                for (let i = 0; i < len; i++) {
                    if (userText[i] === currentText[i]) correct++;
                    else errors++;
                }
                if (userText.length > currentText.length) {
                    errors += userText.length - currentText.length;
                }
                correctChars = correct;
                errorChars = errors;
                correctSpan.textContent = correctChars;
                errorSpan.textContent = errorChars;
            }

            function checkStageCompletion() {
                return (userText.length === currentText.length && errorChars === 0);
            }

            function switchToExplanation() {
                stage = 'explain';
                currentText = getCurrentTypingText();
                userText = '';

                codeHeader.classList.add('hidden');
                codeTypingContainer.classList.add('hidden');
                explainHeader.classList.remove('hidden');
                explainTypingContainer.classList.remove('hidden');

                activeGhost = explainGhostInput;
                activeOverlay = explainOverlay;
                activeContainer = explainTypingContainer;
                activeGhost.value = '';
                activeGhost.disabled = false;
                renderOverlay(currentText, '', explainOverlay);
                isStageCompleted = false;
                updateStats();
                activeGhost.focus();
                activeContainer.scrollTop = 0;
            }

            function completeTask() {
                isTaskCompleted = true;
                isStageCompleted = true;
                activeGhost.disabled = true;
                nextBtn.disabled = false;
                if (currentMode === 'tasks') {
                    if (stage === 'code') {
                        codeStageLabel.textContent = '✅ КОД ЗАВЕРШЁН';
                    } else {
                        explainStageLabel.textContent = '✅ ОБЪЯСНЕНИЕ ЗАВЕРШЕНО';
                    }
                } else {
                    codeStageLabel.textContent = '✅ ОТВЕТ ЗАВЕРШЁН';
                }
            }

            function handleInput(e) {
                if (isStageCompleted || isTaskCompleted) return;
                userText = e.target.value;
                renderOverlay(currentText, userText, activeOverlay);
                updateStats();
                if (checkStageCompletion()) {
                    if (currentMode === 'tasks' && stage === 'code') {
                        isStageCompleted = true;
                        codeStageLabel.textContent = '✅ КОД ЗАВЕРШЁН';
                        if (explainCheckbox.checked) {
                            switchToExplanation();
                        } else {
                            completeTask();
                        }
                    } else {
                        completeTask();
                    }
                }
            }

            function handleKeyDown(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const ta = e.target;
                    const start = ta.selectionStart;
                    const end = ta.selectionEnd;
                    const spaces = '    ';
                    ta.value = ta.value.substring(0, start) + spaces + ta.value.substring(end);
                    ta.selectionStart = ta.selectionEnd = start + spaces.length;
                    handleInput({ target: ta });
                }
            }

            function updateUIForMode() {
                const total = getTotalCount();
                const item = getCurrentItem();
                questionDisplay.textContent = item.question;

                // Сброс этапа
                stage = 'code';
                currentText = getCurrentTypingText();
                userText = '';
                isStageCompleted = false;
                isTaskCompleted = false;
                nextBtn.disabled = true;

                // Для вопросов скрываем этап объяснения и чекбокс "Добавить объяснение"
                if (currentMode === 'questions') {
                    explainCheckbox.disabled = true;
                    explainCheckbox.checked = false;
                    codeStageLabel.textContent = '📝 ОТВЕТ';
                    explainHeader.classList.add('hidden');
                    explainTypingContainer.classList.add('hidden');
                    shortAnswerCheckbox.disabled = false;
                } else {
                    explainCheckbox.disabled = false;
                    codeStageLabel.textContent = '📝 КОД';
                    explainStageLabel.textContent = '📝 ОБЪЯСНЕНИЕ';
                    shortAnswerCheckbox.disabled = true;
                }

                codeHeader.classList.remove('hidden');
                codeTypingContainer.classList.remove('hidden');
                explainHeader.classList.add('hidden');
                explainTypingContainer.classList.add('hidden');

                activeGhost = codeGhostInput;
                activeOverlay = codeOverlay;
                activeContainer = codeTypingContainer;
                activeGhost.value = '';
                activeGhost.disabled = false;
                renderOverlay(currentText, '', codeOverlay);
                correctChars = 0; errorChars = 0;
                correctSpan.textContent = '0';
                errorSpan.textContent = '0';

                taskCounter.textContent = `${currentMode === 'tasks' ? 'Задание' : 'Вопрос'} ${currentIndex + 1} / ${total}`;
                activeGhost.focus();
                activeContainer.scrollTop = 0;
            }

            function loadItem(index) {
                currentIndex = index;
                updateUIForMode();
            }

            function goToNextItem() {
                const total = getTotalCount();
                if (currentIndex < total - 1) {
                    currentIndex++;
                    loadItem(currentIndex);
                } else {
                    questionDisplay.textContent = "🎉 Поздравляем! Вы прошли все элементы! 🎉";
                    codeTypingContainer.classList.add('hidden');
                    explainTypingContainer.classList.add('hidden');
                    codeHeader.classList.add('hidden');
                    explainHeader.classList.add('hidden');
                    taskCounter.textContent = `Завершено ${total} / ${total}`;
                    nextBtn.disabled = true;
                }
            }

            // Переключение режима
            function setMode(mode) {
                currentMode = mode;
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
                currentIndex = 0;
                loadItem(0);
            }

            // Обработчики
            codeGhostInput.addEventListener('input', handleInput);
            explainGhostInput.addEventListener('input', handleInput);
            codeGhostInput.addEventListener('keydown', handleKeyDown);
            explainGhostInput.addEventListener('keydown', handleKeyDown);

            nextBtn.addEventListener('click', goToNextItem);

            showTextCheckbox.addEventListener('change', () => {
                renderOverlay(currentText, userText, activeOverlay);
            });

            shortAnswerCheckbox.addEventListener('change', () => {
                if (currentMode === 'questions') {
                    currentText = getCurrentTypingText();
                    userText = activeGhost.value;
                    if (userText.length > currentText.length) {
                        userText = userText.substring(0, currentText.length);
                        activeGhost.value = userText;
                    }
                    renderOverlay(currentText, userText, activeOverlay);
                    updateStats();
                    if (checkStageCompletion()) {
                        completeTask();
                    }
                }
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });

            document.querySelectorAll('.typing-container').forEach(c => {
                c.addEventListener('click', () => {
                    if (!isTaskCompleted && !isStageCompleted) activeGhost.focus();
                });
            });

            // Старт
            setMode('tasks');
        })();
    </script>
</body>

</html>
